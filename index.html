
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Lock Warning</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #001a66; /* deep blue */
            color: red;

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .warning-box {
            border: 4px solid red;
            padding: 40px;
            max-width: 90%;
            box-shadow: 0 0 20px red;
        }

        h1 {
            font-size: 6vw;
            margin-bottom: 20px;
        }

        p {
            font-size: 2.5vw;
            margin: 10px 0;
        }

        .blink {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="warning-box">
        <h1 class="blink">⚠ NETWORK LOCKED ⚠</h1>
        <p>Unauthorized access detected</p>
        <p>All connections have been temporarily suspended</p>
        <p>Please contact your system administrator</p>
        <p>Reference Code: NET-45821</p>
    </div>

</body>
</html>
