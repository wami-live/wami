<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC Scanner</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 90%;
    max-width: 420px;
    text-align: center;
}

h1 {
    margin-bottom: 25px;
}

.status {
    margin-bottom: 20px;
    opacity: 0.8;
}

.scan-btn {
    font-size: 26px;
    padding: 25px;
    width: 100%;
    border: none;
    border-radius: 15px;
    background: #007bff;
    color: white;
}

.output {
    margin-top: 20px;
    padding: 15px;
    font-size: 20px;
    width: 100%;
    border-radius: 10px;
    border: none;
    text-align: center;
}

/* Action buttons */
.actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.actions button {
    flex: 1;
    font-size: 18px;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: #444;
    color: white;
}

/* Feedback */
.flash {
    animation: flash 0.5s;
}

@keyframes flash {
    0% { background: #28a745; }
    100% { background: #121212; }
}

.copied {
    color: #28a745;
}
</style>
</head>

<body>

<div class="container">
    <h1>📡 NFC Scanner</h1>

    <div id="status" class="status">Tap scan to start</div>

    <button class="scan-btn" onclick="readNFC()">Scan NFC</button>

    <input id="output" class="output" placeholder="Waiting for scan..." readonly>

    <div class="actions">
        <button onclick="selectAll()">Select All</button>
        <button onclick="copyText()">Copy</button>
    </div>
</div>

<script>
async function readNFC() {
    const status = document.getElementById("status");
    const output = document.getElementById("output");

    try {
        status.textContent = "Hold near NFC tag...";
        const ndef = new NDEFReader();
        await ndef.scan();

        ndef.onreading = event => {
            const decoder = new TextDecoder();

            for (const record of event.message.records) {
                const text = decoder.decode(record.data);

                output.value = text;
                status.textContent = "✅ NFC read successful";

                // Flash + vibration
                document.body.classList.add("flash");
                setTimeout(() => document.body.classList.remove("flash"), 500);

                if (navigator.vibrate) navigator.vibrate(200);
            }
        };

    } catch (err) {
        status.textContent = "❌ NFC error: " + err;
    }
}

// Select all text
function selectAll() {
    const output = document.getElementById("output");
    output.focus();
    output.select();
}

// Copy to clipboard
function copyText() {
    const output = document.getElementById("output");
    const status = document.getElementById("status");

    navigator.clipboard.writeText(output.value)
        .then(() => {
            status.textContent = "📋 Copied to clipboard";
            status.classList.add("copied");

            if (navigator.vibrate) navigator.vibrate(100);

            setTimeout(() => {
                status.textContent = "Ready";
                status.classList.remove("copied");
            }, 1500);
        })
        .catch(() => {
            status.textContent = "❌ Copy failed";
        });
}
</script>

</body>
</html>
